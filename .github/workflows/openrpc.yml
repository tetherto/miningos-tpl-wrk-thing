name: OpenRPC
on:
  push:
    branches: [main]
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run openrpc:generate
      - run: npm run openrpc:validate
      - name: Commit updated spec
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/openrpc.json docs/types/
          git diff --staged --quiet || git commit -m "chore: regenerate openrpc.json"
          git push
