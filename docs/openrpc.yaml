openrpc: 1.4.1
info:
  title: MiningOS Thing Worker API
  version: 1.0.0
  description: JSON-RPC 2.0 API for managing Things in MiningOS
  license:
    name: Apache-2.0
methods:
  - name: getRack
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/GetRackParams'
    result:
      name: result
      schema: {}
  - name: queryThing
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/QueryThingParams'
    result:
      name: result
      schema: {}
  - name: listThings
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/ListThingsParams'
    result:
      name: result
      schema: {}
  - name: getThingsCount
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/GetThingsCountParams'
    result:
      name: result
      schema: {}
  - name: registerThing
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/RegisterThingParams'
    result:
      name: result
      schema: {}
  - name: updateThing
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/UpdateThingParams'
    result:
      name: result
      schema: {}
  - name: saveThingComment
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/SaveThingCommentParams'
    result:
      name: result
      schema: {}
  - name: editThingComment
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/EditThingCommentParams'
    result:
      name: result
      schema: {}
  - name: deleteThingComment
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/DeleteThingCommentParams'
    result:
      name: result
      schema: {}
  - name: forgetThings
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/ForgetThingsParams'
    result:
      name: result
      schema: {}
  - name: applyThings
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/ApplyThingsParams'
    result:
      name: result
      schema: {}
  - name: tailLog
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/TailLogParams'
    result:
      name: result
      schema: {}
  - name: getHistoricalLogs
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/GetHistoricalLogsParams'
    result:
      name: result
      schema: {}
  - name: getReplicaConf
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/GetReplicaConfParams'
    result:
      name: result
      schema: {}
  - name: rackReboot
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/RackRebootParams'
    result:
      name: result
      schema: {}
  - name: getWrkExtData
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/GetWrkExtDataParams'
    result:
      name: result
      schema: {}
  - name: getWrkConf
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/GetWrkConfParams'
    result:
      name: result
      schema: {}
  - name: getThingConf
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/GetThingConfParams'
    result:
      name: result
      schema: {}
  - name: getWrkSettings
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/GetWrkSettingsParams'
    result:
      name: result
      schema: {}
  - name: saveWrkSettings
    params:
      - name: req
        schema:
          $ref: '#/components/schemas/SaveWrkSettingsParams'
    result:
      name: result
      schema: {}
components:
  schemas:
    GetRackParams:
      description: Parameters for `getRack` RPC method
    QueryThingParams:
      additionalProperties: false
      description: Parameters for `queryThing` RPC method
      properties:
        id:
          description: '- Thing ID'
          type: string
        method:
          description: '- Method name to execute on thing controller'
          type: string
        params:
          description: '- Parameters to pass to the method'
          items: {}
          type: array
      required:
        - id
        - method
        - params
      type: object
    FieldProjection:
      additionalProperties:
        enum:
          - 0
          - 1
        type: number
      description: Field projection for query results
      type: object
    MongoQuery:
      description: MongoDB-style query object for filtering things
    SortCriteria:
      additionalProperties:
        enum:
          - 1
          - -1
        type: number
      description: Sort criteria for query results
      type: object
    ListThingsParams:
      additionalProperties: false
      description: Parameters for `listThings` RPC method
      properties:
        fields:
          $ref: '#/components/schemas/FieldProjection'
          description: '- Field projection'
        limit:
          description: '- Maximum records to return'
          type: number
        offset:
          description: '- Number of records to skip'
          type: number
        query:
          $ref: '#/components/schemas/MongoQuery'
          description: '- MongoDB-style query filter'
        sort:
          $ref: '#/components/schemas/SortCriteria'
          description: '- Sort criteria'
        status:
          description: '- Include last status information'
          type: boolean
      type: object
    GetThingsCountParams:
      additionalProperties: false
      description: Parameters for `getThingsCount` RPC method
      properties:
        query:
          $ref: '#/components/schemas/MongoQuery'
          description: '- MongoDB-style query filter'
      type: object
    ThingInfo:
      additionalProperties: false
      description: Thing metadata and state information
      properties:
        container:
          description: '- Container identifier (or ''maintenance'' for offline)'
          type: string
        createdAt:
          description: '- Unix timestamp of creation'
          type: number
        lastActionId:
          description: '- ID of the last action performed'
          type: string
        pos:
          description: '- Position identifier within a container/rack'
          type: string
        updatedAt:
          description: '- Unix timestamp of last update'
          type: number
      required:
        - createdAt
        - updatedAt
      type: object
    ThingOpts:
      additionalProperties: false
      description: Connection and configuration options for a thing
      properties:
        host:
          description: '- Host address for connection'
          type: string
        port:
          description: '- Port number for connection'
          type: number
      type: object
    RegisterThingParams:
      additionalProperties: false
      description: Parameters for `registerThing` RPC method
      properties:
        code:
          description: '- Device code (auto-generated if not provided, must match pattern *-NNNN)'
          type: string
        comment:
          description: '- Registration comment'
          type: string
        id:
          description: '- Device ID (auto-generated UUID if not provided)'
          type: string
        info:
          $ref: '#/components/schemas/ThingInfo'
          description: '- Device metadata'
        opts:
          $ref: '#/components/schemas/ThingOpts'
          description: '- Device connection options (required)'
        tags:
          description: '- Additional tags'
          items:
            type: string
          type: array
        user:
          description: '- User making the request (required if comment provided)'
          type: string
      required:
        - opts
      type: object
    UpdateThingParams:
      additionalProperties: false
      description: Parameters for `updateThing` RPC method
      properties:
        actionId:
          description: '- Action identifier for tracking'
          type: string
        comment:
          description: '- Update comment'
          type: string
        forceOverwrite:
          description: '- If true, replace instead of merge'
          type: boolean
        id:
          description: '- Device ID (required)'
          type: string
        info:
          $ref: '#/components/schemas/ThingInfo'
          description: '- Updated metadata'
        opts:
          $ref: '#/components/schemas/ThingOpts'
          description: '- Updated connection options'
        tags:
          description: '- Updated tags'
          items:
            type: string
          type: array
        user:
          description: '- User making the request'
          type: string
      required:
        - id
      type: object
    SaveThingCommentParams:
      additionalProperties: false
      description: Parameters for `saveThingComment` RPC method
      properties:
        comment:
          description: '- Comment text'
          type: string
        pos:
          description: '- Optional position reference'
          type: string
        thingId:
          description: '- Thing ID to add comment to'
          type: string
        user:
          description: '- Username of comment author'
          type: string
      required:
        - thingId
        - comment
        - user
      type: object
    EditThingCommentParams:
      additionalProperties: false
      description: Parameters for `editThingComment` RPC method
      properties:
        comment:
          description: '- New comment text'
          type: string
        id:
          description: '- Comment ID (preferred)'
          type: string
        thingId:
          description: '- Thing ID'
          type: string
        ts:
          description: '- Comment timestamp (fallback if id not provided)'
          type: number
        user:
          description: '- Username (must match original author)'
          type: string
      required:
        - thingId
        - comment
        - user
      type: object
    DeleteThingCommentParams:
      additionalProperties: false
      description: Parameters for `deleteThingComment` RPC method
      properties:
        id:
          description: '- Comment ID (preferred)'
          type: string
        thingId:
          description: '- Thing ID'
          type: string
        ts:
          description: '- Comment timestamp (fallback if id not provided)'
          type: number
        user:
          description: '- Username (must match original author)'
          type: string
      required:
        - thingId
        - user
      type: object
    ForgetThingsParams:
      additionalProperties: false
      description: Parameters for `forgetThings` RPC method
      properties:
        all:
          description: '- If true, remove all things'
          type: boolean
        query:
          $ref: '#/components/schemas/MongoQuery'
          description: '- Query to select things to remove'
      type: object
    ApplyThingsParams:
      additionalProperties: false
      description: Parameters for `applyThings` RPC method
      properties:
        fields:
          $ref: '#/components/schemas/FieldProjection'
          description: '- Field projection for selection'
        limit:
          description: '- Maximum things to process'
          type: number
        method:
          description: '- Method to execute on each thing'
          type: string
        offset:
          description: '- Number of things to skip'
          type: number
        params:
          description: '- Parameters to pass to the method'
          items: {}
          type: array
        query:
          $ref: '#/components/schemas/MongoQuery'
          description: '- Query to select things (default: all)'
        sort:
          $ref: '#/components/schemas/SortCriteria'
          description: '- Sort criteria for selection'
      required:
        - method
      type: object
    TailLogParams:
      additionalProperties: false
      description: Parameters for `tailLog` RPC method
      properties:
        end:
          description: '- End timestamp for time range'
          type: number
        fields:
          $ref: '#/components/schemas/FieldProjection'
          description: '- Field projection'
        groupRange:
          description: '- Group logs by time range'
          type: string
        key:
          description: '- Log type identifier (e.g., ''thing-5m'', ''stat-H'')'
          type: string
        limit:
          description: '- Maximum entries (default 100 if no time range)'
          type: number
        offset:
          description: '- Log file offset'
          type: number
        shouldCalculateAvg:
          description: '- Calculate averages when grouping'
          type: boolean
        start:
          description: '- Start timestamp for time range'
          type: number
        tag:
          description: '- Thing tag or identifier'
          type: string
      required:
        - key
        - tag
      type: object
    GetHistoricalLogsParams:
      additionalProperties: false
      description: Parameters for `getHistoricalLogs` RPC method
      properties:
        end:
          description: '- End timestamp'
          type: number
        fields:
          $ref: '#/components/schemas/FieldProjection'
          description: '- Field projection (for ''info'' type)'
        limit:
          description: '- Maximum entries'
          type: number
        logType:
          description: '- Type of historical logs to retrieve'
          enum:
            - alerts
            - info
          type: string
        offset:
          description: '- Starting offset'
          type: number
        start:
          description: '- Start timestamp'
          type: number
      required:
        - logType
      type: object
    GetReplicaConfParams:
      description: Parameters for `getReplicaConf` RPC method
    RackRebootParams:
      description: Parameters for `rackReboot` RPC method
    GetWrkExtDataParams:
      description: Parameters for `getWrkExtData` RPC method
    GetWrkConfParams:
      additionalProperties: false
      description: Parameters for `getWrkConf` RPC method
      properties:
        fields:
          $ref: '#/components/schemas/FieldProjection'
          description: '- Field projection for config'
      type: object
    GetThingConfParams:
      additionalProperties: false
      description: Parameters for `getThingConf` RPC method
      properties:
        requestType:
          const: nextAvailableCode
          description: '- Type of configuration to retrieve'
          type: string
      required:
        - requestType
      type: object
    GetWrkSettingsParams:
      description: Parameters for `getWrkSettings` RPC method
    SaveWrkSettingsParams:
      additionalProperties: false
      description: Parameters for `saveWrkSettings` RPC method
      properties:
        entries:
          description: '- Settings entries to save'
      required:
        - entries
      type: object
